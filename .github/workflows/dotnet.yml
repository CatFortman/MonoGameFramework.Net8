# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Clear NuGet locals (avoid stale locks)
      run: dotnet nuget locals all --clear

    - name: Prepare dotnet tools folder and add to PATH
      run: |
        mkdir -p $HOME/.dotnet/tools
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Install MonoGame MGCB tools into explicit tool-path (isolated cache)
      env:
        # isolate NuGet package cache for tool install and subsequent build to avoid locks
        NUGET_PACKAGES: $RUNNER_TEMP/.nuget/packages
        DOTNET_ROOT: /usr/share/dotnet
      run: |
        mkdir -p "$NUGET_PACKAGES"
        dotnet tool install --tool-path $HOME/.dotnet/tools dotnet-mgcb --version 3.8.4 || true
        dotnet tool install --tool-path $HOME/.dotnet/tools dotnet-mgcb-editor --version 3.8.4 || true

    - name: Top-level dotnet tool restore (ensures manifest tools are available)
      env:
        NUGET_PACKAGES: $RUNNER_TEMP/.nuget/packages
        DOTNET_ROOT: /usr/share/dotnet
      run: |
        dotnet tool restore || true

    - name: Restore dependencies
      env:
        NUGET_PACKAGES: $RUNNER_TEMP/.nuget/packages
      run: dotnet restore

    - name: Build
      env:
        NUGET_PACKAGES: $RUNNER_TEMP/.nuget/packages
      run: dotnet build --no-restore -p:BuildInParallel=false
      
    - name: Test
      run: dotnet test --no-build --verbosity normal
