# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Install MonoGame MGCB tools (prevent concurrent restore failures)
      run: |
        dotnet tool install --global dotnet-mgcb --version 3.8.4 || true
        dotnet tool install --global dotnet-mgcb-editor --version 3.8.4 || true
      env:
        PATH: $HOME/.dotnet/tools:${PATH}
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      # disable MSBuild parallel project content processing (prevents concurrent tool restore/actions)
      run: dotnet build --no-restore -p:BuildInParallel=false
    - name: Test
      run: dotnet test --no-build --verbosity normal
